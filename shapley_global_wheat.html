<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheat SHAP — Intensity & Impact Heatmaps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f9f4ea;
  --surface:#ffffff;
  --border:#d6c9a8;
  --text:#2a2015;
  --muted:#8a7a5a;
  --accent:#5a3800;
  --tab-h:38px;
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:'Source Code Pro',monospace;overflow:hidden}

#app{display:grid;grid-template-columns:230px 1fr;height:100vh}

/* ── Sidebar ── */
#sidebar{background:var(--surface);border-right:1.5px solid var(--border);
  padding:20px 16px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}

.sb-title{font-family:'Source Serif 4',serif;font-weight:300;font-size:1rem;
  line-height:1.4;color:var(--accent)}
.sb-sub{font-size:0.56rem;color:var(--muted);margin-top:3px;
  text-transform:uppercase;letter-spacing:.1em}
.sec-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);margin-bottom:7px}

/* Tabs */
.tab-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.tab-btn{flex:1;padding:8px 0;font-family:'Source Code Pro',monospace;
  font-size:0.62rem;background:var(--bg);border:none;cursor:pointer;
  color:var(--muted);letter-spacing:.06em;transition:all .15s}
.tab-btn.active{background:var(--accent);color:#fff}

/* Lag pills */
.lag-grid{display:flex;flex-wrap:wrap;gap:4px}
.lag-pill{padding:3px 7px;font-size:0.58rem;border:1px solid var(--border);
  border-radius:3px;cursor:pointer;background:var(--bg);color:var(--muted);
  transition:all .15s;font-family:'Source Code Pro',monospace}
.lag-pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Search */
.search-box{width:100%;padding:6px 9px;font-family:'Source Code Pro',monospace;
  font-size:0.62rem;border:1px solid var(--border);border-radius:3px;
  background:var(--bg);color:var(--text);outline:none}
.search-box:focus{border-color:var(--accent)}

/* Sort buttons */
.sort-row{display:flex;gap:4px}
.sort-btn{flex:1;padding:5px 0;font-size:0.57rem;border:1px solid var(--border);
  border-radius:3px;cursor:pointer;background:var(--bg);color:var(--muted);
  font-family:'Source Code Pro',monospace;transition:all .15s;text-align:center}
.sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Gradient bar */
.grad-bar{height:9px;border-radius:3px;margin-bottom:4px}
.grad-int{background:linear-gradient(to right,#ace600,#FFAA33,#b10026)}
.grad-imp{background:linear-gradient(to right,#053061,#6AACD0,#F7F7F7,#E58267,#67001F)}
.grad-labels{display:flex;justify-content:space-between;font-size:0.53rem;color:var(--muted)}

.stat-row{display:flex;gap:6px}
.stat-box{flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:5px 8px}
.stat-val{font-size:0.78rem;color:var(--accent)}
.stat-lbl{font-size:0.5rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-top:1px}

/* ── Main ── */
#main{display:flex;flex-direction:column;overflow:hidden}

/* Scroll area */
#scroll-area{flex:1;overflow:auto;position:relative;padding:16px 20px}

#chart-container{position:relative}

/* Facet panels */
.facet-row{display:flex;gap:0;align-items:flex-start;margin-bottom:4px}
.facet-label-y{width:32px;flex-shrink:0;font-size:0.55rem;color:var(--muted);
  text-align:right;padding-right:6px;padding-top:4px;
  text-transform:uppercase;letter-spacing:.06em}

.facets-wrap{display:flex;gap:6px;flex-wrap:nowrap}

.facet-panel{display:flex;flex-direction:column;flex-shrink:0}
.facet-header{font-size:0.58rem;color:var(--muted);text-align:center;
  padding-bottom:4px;letter-spacing:.05em}

/* The actual heatmap SVG sits inside */
.heatmap-svg{display:block}

/* Tooltip */
#tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);
  border-radius:3px;padding:9px 13px;font-size:0.62rem;color:var(--text);
  pointer-events:none;opacity:0;transition:opacity .1s;z-index:999;
  max-width:220px;line-height:1.7;box-shadow:0 2px 8px rgba(0,0,0,.1)}
#tooltip strong{color:var(--accent)}

/* Infobar */
#infobar{padding:6px 20px;background:var(--surface);border-top:1px solid var(--border);
  font-size:0.56rem;color:var(--muted);letter-spacing:.06em;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div>
      <div class="sb-title">Wheat SHAP<br>Feature Heatmaps</div>
      <div class="sb-sub">Global Agnostic · Shapley</div>
    </div>

    <div>
      <div class="sec-lbl">Plot</div>
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="intensity">Intensity</button>
        <button class="tab-btn"        data-tab="impact">Impact</button>
      </div>
    </div>

    <div>
      <div class="sec-lbl">Lag horizon</div>
      <div class="lag-grid" id="lag-pills"></div>
    </div>

    <div>
      <div class="sec-lbl">Search feature</div>
      <input class="search-box" id="feat-search" type="text" placeholder="e.g. obs, urea, stocks…">
    </div>

    <div>
      <div class="sec-lbl">Sort features by</div>
      <div class="sort-row">
        <div class="sort-btn active" data-sort="value">Value</div>
        <div class="sort-btn"        data-sort="name">Name</div>
        <div class="sort-btn"        data-sort="month">Month 6</div>
      </div>
    </div>

    <div>
      <div class="sec-lbl" id="legend-lbl">Colour scale — intensity</div>
      <div class="grad-bar grad-int" id="grad-bar"></div>
      <div class="grad-labels" id="grad-labels">
        <span id="glo">Low</span><span id="gmid"></span><span id="ghi">High</span>
      </div>
    </div>

    <div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="s-feat">—</div>
          <div class="stat-lbl">Features</div></div>
        <div class="stat-box"><div class="stat-val" id="s-lags">—</div>
          <div class="stat-lbl">Lags shown</div></div>
      </div>
    </div>

    <div style="margin-top:auto;font-size:0.52rem;color:var(--muted);line-height:1.8">
      <strong style="color:var(--text)">Intensity</strong> = |SHAP| magnitude<br>
      <strong style="color:var(--text)">Impact</strong> = signed SHAP direction<br>
      x = forecast month · y = feature
    </div>
  </div>

  <div id="main">
    <div id="scroll-area">
      <div id="chart-container"></div>
    </div>
    <div id="infobar">hover a cell for details</div>
  </div>
</div>

<div id="tooltip"></div>

// intensity_colors from R: #ace600 → #FFAA33 → #b10026
function intensityColor(t) {  // t ∈ [0,1]
  if (t <= 0.5) {
    const s = t*2;
    return lerpRgb([0xac,0xe6,0x00],[0xFF,0xAA,0x33],s);
  } else {
    const s = (t-0.5)*2;
    return lerpRgb([0xFF,0xAA,0x33],[0xb1,0x00,0x26],s);
  }
}

// impact_colors from R (9-stop diverging)
const IMP_STOPS = [
  [0,   [0x05,0x30,0x61]],
  [0.125,[0x29,0x71,0xB1]],
  [0.25, [0x6A,0xAC,0xD0]],
  [0.375,[0xC1,0xDD,0xEB]],
  [0.5,  [0xF7,0xF7,0xF7]],
  [0.625,[0xFA,0xCD,0xB5]],
  [0.75, [0xE5,0x82,0x67]],
  [0.875,[0xBB,0x29,0x33]],
  [1.0,  [0x67,0x00,0x1F]]
];
function impactColor(t) {
  for (let i=0;i<IMP_STOPS.length-1;i++) {
    const [t0,c0]=IMP_STOPS[i], [t1,c1]=IMP_STOPS[i+1];
    if (t>=t0 && t<=t1) return lerpRgb(c0,c1,(t-t0)/(t1-t0));
  }
  return lerpRgb(IMP_STOPS[IMP_STOPS.length-2][1], IMP_STOPS[IMP_STOPS.length-1][1], 1);
}

function lerpRgb(a,b,t) {
  const r=Math.round(a[0]+(b[0]-a[0])*t);
  const g=Math.round(a[1]+(b[1]-a[1])*t);
  const bl=Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g},${bl})`;
}

// ── Build index: data[lag][feature][month] = value ────────────────────────────
function buildIndex(data, valKey) {
  const idx = {};
  data.forEach(r => {
    const lag = r.lags, feat = r.feature, mon = r.month, val = r[valKey];
    if (!idx[lag]) idx[lag] = {};
    if (!idx[lag][feat]) idx[lag][feat] = {};
    idx[lag][feat][mon] = val;
  });
  return idx;
}

const IDX_INT = buildIndex(INTENSITY_DATA, 'mean_intensity');
const IDX_IMP = buildIndex(IMPACT_DATA,    'mean_impact');

// ── Get all features that appear in current data ──────────────────────────────
function getFeatures(tab) {
  const data = tab==='intensity' ? INTENSITY_DATA : IMPACT_DATA;
  return [...new Set(data.map(r=>r.feature))];
}

// ── Filter & sort features ────────────────────────────────────────────────────
function filteredFeatures(tab, lagSet, q, sort) {
  const data  = tab==='intensity' ? INTENSITY_DATA : IMPACT_DATA;
  const valKey= tab==='intensity' ? 'mean_intensity' : 'mean_impact';
  const idx   = tab==='intensity' ? IDX_INT : IDX_IMP;
  const baseOrder = tab==='intensity' ? FEAT_ORDER_INT : FEAT_ORDER_IMP;

  // All features present across selected lags
  const featSet = new Set();
  data.forEach(r => { if (lagSet.has(r.lags)) featSet.add(r.feature); });

  // Apply search
  let feats = [...featSet];
  if (q) feats = feats.filter(f => f.toLowerCase().includes(q.toLowerCase()));

  // Sort
  if (sort === 'value') {
    // mean absolute value across all selected lags & months
    feats.sort((a,b) => {
      const avg = f => {
        let s=0,n=0;
        lagSet.forEach(lag => {
          if (idx[lag]&&idx[lag][f]) Object.values(idx[lag][f]).forEach(v=>{s+=Math.abs(v);n++;});
        });
        return n>0?s/n:0;
      };
      return avg(a)-avg(b); // ascending → low at bottom
    });
  } else if (sort === 'name') {
    feats.sort((a,b) => a.localeCompare(b)).reverse();
  } else { // month 6 sort
    feats.sort((a,b) => {
      const get = f => { let s=0,n=0; lagSet.forEach(lag=>{ const v=idx[lag]?.[f]?.[6]; if(v!=null){s+=Math.abs(v);n++;}}); return n>0?s/n:0; };
      return get(a)-get(b);
    });
  }

  return feats; // bottom-to-top (SVG y goes down, so we'll reverse when drawing)
}

// ── Color scale helpers ───────────────────────────────────────────────────────
function getColorScale(tab, data) {
  if (tab === 'intensity') {
    const vals = data.map(r=>r.mean_intensity).filter(v=>v!=null);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    return { mn, mx, mid:null, fn: t => intensityColor(t) };
  } else {
    const vals = data.map(r=>r.mean_impact).filter(v=>v!=null);
    const absMax = Math.max(Math.abs(Math.min(...vals)), Math.abs(Math.max(...vals)));
    return { mn: -absMax, mx: absMax, mid:0,
      fn: t => impactColor(t) };
  }
}

  // Y-label column
  const yCol = document.createElement('div');
  yCol.style.cssText = `width:${Y_LABEL_W}px;flex-shrink:0;padding-top:${PANEL_HDR}px`;

  // Create canvas for y-labels
  const yCanvas = document.createElement('canvas');
  yCanvas.width  = Y_LABEL_W;
  yCanvas.height = svgH;
  yCanvas.style.cssText = `display:block;width:${Y_LABEL_W}px;height:${svgH}px`;
  const yCtx = yCanvas.getContext('2d');
  yCtx.font = '10px "Source Code Pro", monospace';
  yCtx.textAlign = 'right';
  yCtx.fillStyle = '#2a2015';

  featsTop.forEach((feat, fi) => {
    const y = fi * CELL_H + CELL_H * 0.5 + 4;
    yCtx.fillStyle = '#2a2015';
    yCtx.fillText(feat.length>18 ? feat.slice(0,17)+'…' : feat, Y_LABEL_W-6, y);
  });
  yCol.appendChild(yCanvas);

  // Panels
  const panelsDiv = document.createElement('div');
  panelsDiv.style.cssText = `display:flex;gap:${PANEL_GAP}px;flex-shrink:0`;

  lagList.forEach(lag => {
    const panel = document.createElement('div');
    panel.style.cssText = 'display:flex;flex-direction:column;flex-shrink:0';

    // Panel header
    const hdr = document.createElement('div');
    hdr.textContent = `Lag ${lag}`;
    hdr.style.cssText = `font-size:10px;color:var(--muted);text-align:center;
      height:${PANEL_HDR}px;line-height:${PANEL_HDR}px;letter-spacing:.04em;
      font-family:'Source Code Pro',monospace`;
    panel.appendChild(hdr);

    // Canvas for cells
    const canvas = document.createElement('canvas');
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = svgW * dpr;
    canvas.height = svgH * dpr;
    canvas.style.cssText = `display:block;width:${svgW}px;height:${svgH}px;cursor:crosshair`;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Draw cells
    featsTop.forEach((feat, fi) => {
      months.forEach((mon, mi) => {
        const val = idx[lag]?.[feat]?.[mon];
        let t;
        if (val == null) { t = null; }
        else if (scale.mid != null) {
          t = (val - scale.mn) / (scale.mx - scale.mn);
          t = Math.max(0, Math.min(1, t));
        } else {
          t = (val - scale.mn) / (scale.mx - scale.mn);
          t = Math.max(0, Math.min(1, t));
        }
        ctx.fillStyle = t != null ? scale.fn(t) : '#e0d8cc';
        ctx.fillRect(mi*CELL_W, fi*CELL_H, CELL_W-1, CELL_H-1);
      });
    });

    // X axis
    months.forEach((mon, mi) => {
      ctx.fillStyle = '#8a7a5a';
      ctx.font = '9px "Source Code Pro", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(MONTH_LABELS[mon], mi*CELL_W + CELL_W/2, nF*CELL_H + 14);
      // Q markers
      if (MONTH_Q[mon]) {
        ctx.fillStyle = '#5a3800';
        ctx.font = '8px "Source Code Pro", monospace';
        ctx.fillText(MONTH_Q[mon], mi*CELL_W + CELL_W/2, nF*CELL_H + 23);
        ctx.fillStyle = '#8a7a5a';
      }
    });

    // Hover
    const tip = document.getElementById('tooltip');
    const infobar = document.getElementById('infobar');

    canvas.addEventListener('mousemove', function(e) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const mi = Math.floor(mx / CELL_W);
      const fi = Math.floor(my / CELL_H);
      if (mi < 0 || mi >= months.length || fi < 0 || fi >= featsTop.length) {
        tip.style.opacity = '0'; return;
      }
      const feat = featsTop[fi];
      const mon  = months[mi];
      const val  = idx[lag]?.[feat]?.[mon];
      if (val == null) { tip.style.opacity='0'; return; }

      tip.style.opacity = '1';
      tip.style.left = (e.clientX+14)+'px';
      tip.style.top  = (e.clientY-28)+'px';
      const label = activeTab==='intensity' ? 'Mean intensity' : 'Mean impact';
      tip.innerHTML = `<strong>${feat}</strong><br>Month: ${mon} · Lag: ${lag}<br>${label}: ${val.toFixed(5)}`;
      infobar.textContent = `${feat}  ·  month ${mon}  ·  lag ${lag}  ·  ${label}: ${val.toFixed(5)}`;
    });
    canvas.addEventListener('mouseleave', () => {
      tip.style.opacity='0';
      infobar.textContent = 'hover a cell for details';
    });

    panel.appendChild(canvas);
    panelsDiv.appendChild(panel);
  });

  outerDiv.appendChild(yCol);
  outerDiv.appendChild(panelsDiv);
  container.appendChild(outerDiv);

  // Set container min-width so horizontal scroll works
  container.style.minWidth = (Y_LABEL_W + lagList.length*(svgW+PANEL_GAP)) + 'px';
}

function round2(v) { return typeof v==='number' ? v.toFixed(3) : v; }

// ── Build lag pills ───────────────────────────────────────────────────────────
const lagPillContainer = document.getElementById('lag-pills');
ALL_LAGS.forEach(lag => {
  const pill = document.createElement('div');
  pill.className = 'lag-pill on';
  pill.textContent = `L${lag}`;
  pill.dataset.lag = lag;
  pill.addEventListener('click', () => {
    const l = +pill.dataset.lag;
    if (activeLags.has(l)) {
      if (activeLags.size===1) return;
      activeLags.delete(l); pill.classList.remove('on');
    } else {
      activeLags.add(l); pill.classList.add('on');
    }
    draw();
  });
  lagPillContainer.appendChild(pill);
});

// Select-all / none shortcut
const selAll = document.createElement('div');
selAll.textContent = 'all'; selAll.style.cssText='font-size:0.52rem;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:2px;width:100%';
selAll.addEventListener('click', ()=>{ ALL_LAGS.forEach(l=>activeLags.add(l)); lagPillContainer.querySelectorAll('.lag-pill').forEach(p=>p.classList.add('on')); draw(); });
lagPillContainer.appendChild(selAll);

// ── Tab buttons ───────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    draw();
  });
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('feat-search').addEventListener('input', e => {
  searchQ = e.target.value; draw();
});

// ── Sort ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    sortBy = btn.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    draw();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
draw();
window.addEventListener('resize', draw);
</script>
</body>
</html>
